<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>

    <form id="add-form">
      <input
        type="text"
        id="new-title"
        placeholder="What needs to be done?"
        autocomplete="off"
        required
      />
      <button type="submit">Add</button>
    </form>

    <ul id="task-list"></ul>

    <p id="empty-msg" class="empty-msg hidden">No tasks yet. Add one above!</p>
    <p id="error-msg" class="error-msg hidden"></p>
  </div>

  <script>
    const API = "/tasks";

    const taskList = document.getElementById("task-list");
    const emptyMsg = document.getElementById("empty-msg");
    const errorMsg = document.getElementById("error-msg");
    const addForm = document.getElementById("add-form");
    const newTitle = document.getElementById("new-title");
    const openSubtaskPanels = new Set();

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove("hidden");
      setTimeout(() => errorMsg.classList.add("hidden"), 4000);
    }

    function getTaskId(task) {
      return task._id || task.id;
    }

    function readErrorMessage(data, fallback) {
      return data?.message || data?.error || data?.ERROR || fallback;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function snapshotOpenPanels() {
      openSubtaskPanels.clear();
      document.querySelectorAll("#task-list .task-item[data-task-id]").forEach(item => {
        const details = item.querySelector(".subtasks-box");
        if (details && details.open) {
          openSubtaskPanels.add(item.dataset.taskId);
        }
      });
    }

    function renderTasks(tasks) {
      taskList.innerHTML = "";
      emptyMsg.classList.toggle("hidden", tasks.length > 0);

      tasks.forEach(task => {
        const taskId = getTaskId(task);
        const subtasks = Array.isArray(task.subtasks) ? task.subtasks : [];
        const li = document.createElement("li");
        li.dataset.taskId = taskId;
        li.className = "task-item" + (task.completed ? " completed" : "");

        li.innerHTML = `
          <div class="task-top">
            <label class="checkbox-label">
              <input type="checkbox" class="toggle-cb" ${task.completed ? "checked" : ""}>
              <span class="title-text">${escapeHtml(task.title)}</span>
            </label>
            <div class="actions">
              <button class="btn-edit" type="button">✏️</button>
              <button class="btn-delete" type="button">❌</button>
            </div>
          </div>
          <details class="subtasks-box">
            <summary>Subtasks (${subtasks.length})</summary>
            <form class="subtask-form">
              <input class="subtask-input" type="text" placeholder="Add a subtask" required>
              <button type="submit">Add</button>
            </form>
            <ul class="subtask-list">
              ${subtasks.map(subtask => `
                <li class="subtask-item ${subtask.completed ? "completed" : ""}" data-subtask-id="${subtask.subtask_id}">
                  <label class="checkbox-label">
                    <input type="checkbox" class="subtask-toggle" ${subtask.completed ? "checked" : ""}>
                    <span class="subtask-title">${escapeHtml(subtask.title)}</span>
                  </label>
                  <div class="subtask-actions">
                    <button class="btn-edit-subtask" type="button">✏️</button>
                    <button class="btn-delete-subtask" type="button">❌</button>
                  </div>
                </li>
              `).join("")}
            </ul>
          </details>
        `;

        li.querySelector(".toggle-cb").addEventListener("change", () => {
          toggleTask(taskId, !task.completed);
        });

        li.querySelector(".btn-delete").addEventListener("click", () => {
          deleteTask(taskId);
        });

        const editBtn = li.querySelector(".btn-edit");
        editBtn.addEventListener("click", () => {
          startEdit(li, task, taskId, editBtn);
        });

        const details = li.querySelector(".subtasks-box");
        if (openSubtaskPanels.has(taskId)) {
          details.open = true;
        }
        details.addEventListener("toggle", () => {
          if (details.open) {
            openSubtaskPanels.add(taskId);
          } else {
            openSubtaskPanels.delete(taskId);
          }
        });

        li.querySelector(".subtask-form").addEventListener("submit", async e => {
          e.preventDefault();
          const input = li.querySelector(".subtask-input");
          const title = input.value.trim();
          if (!title) return;
          await createSubtask(taskId, title);
          input.value = "";
        });

        li.querySelectorAll(".subtask-item").forEach(subtaskEl => {
          const subtaskId = subtaskEl.dataset.subtaskId;
          const titleEl = subtaskEl.querySelector(".subtask-title");
          const toggle = subtaskEl.querySelector(".subtask-toggle");
          const editSubtaskBtn = subtaskEl.querySelector(".btn-edit-subtask");
          const deleteSubtaskBtn = subtaskEl.querySelector(".btn-delete-subtask");

          toggle.addEventListener("change", () => {
            updateSubtask(taskId, subtaskId, { completed: toggle.checked });
          });

          editSubtaskBtn.addEventListener("click", async () => {
            const currentTitle = titleEl.textContent.trim();
            const updatedTitle = prompt("Edit subtask title", currentTitle);
            if (updatedTitle === null) return;
            const trimmed = updatedTitle.trim();
            if (!trimmed || trimmed === currentTitle) return;
            await updateSubtask(taskId, subtaskId, { title: trimmed });
          });

          deleteSubtaskBtn.addEventListener("click", () => {
            deleteSubtask(taskId, subtaskId);
          });
        });

        taskList.appendChild(li);
      });
    }

    async function loadTasks() {
      snapshotOpenPanels();
      try {
        const res = await fetch(API);
        const data = await res.json();
        if (!res.ok) throw new Error(readErrorMessage(data, "Failed to load tasks"));
        renderTasks(data);
      } catch (e) {
        showError(e.message);
      }
    }

    async function createTask(title) {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(readErrorMessage(data, "Failed to create task"));
      return data;
    }

    async function toggleTask(id, completed) {
      try {
        const res = await fetch(`${API}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ completed }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(readErrorMessage(data, "Failed to update task"));
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    }

    async function deleteTask(id) {
      try {
        const res = await fetch(`${API}/${id}`, { method: "DELETE" });
        const data = await res.json();
        if (!res.ok) throw new Error(readErrorMessage(data, "Failed to delete task"));
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    }

    async function saveEdit(id, newTitleValue) {
      try {
        const res = await fetch(`${API}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: newTitleValue }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(readErrorMessage(data, "Failed to update task"));
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    }

    async function createSubtask(taskId, title) {
      try {
        const res = await fetch(`${API}/${taskId}/subtasks`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(readErrorMessage(data, "Failed to create subtask"));
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    }

    async function updateSubtask(taskId, subtaskId, updates) {
      try {
        const res = await fetch(`${API}/${taskId}/subtasks/${subtaskId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(updates),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(readErrorMessage(data, "Failed to update subtask"));
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    }

    async function deleteSubtask(taskId, subtaskId) {
      try {
        const res = await fetch(`${API}/${taskId}/subtasks/${subtaskId}`, {
          method: "DELETE",
        });
        const data = await res.json();
        if (!res.ok) throw new Error(readErrorMessage(data, "Failed to delete subtask"));
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    }

    function startEdit(li, task, taskId, editBtn) {
      if (li.dataset.editing === "true") {
        return;
      }

      const label = li.querySelector(".checkbox-label");
      const titleSpan = li.querySelector(".title-text");
      if (!label || !titleSpan || !editBtn) {
        return;
      }

      const input = document.createElement("input");
      input.type = "text";
      input.className = "edit-input";
      input.value = task.title;

      li.dataset.editing = "true";
      label.replaceChild(input, titleSpan);

      const saveBtn = editBtn.cloneNode(true);
      saveBtn.textContent = "↵";
      editBtn.replaceWith(saveBtn);
      input.focus();

      const finish = () => {
        const val = input.value.trim();
        if (val && val !== task.title) {
          saveEdit(taskId, val);
        } else {
          loadTasks();
        }
      };

      saveBtn.addEventListener("click", finish);
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") finish();
        if (e.key === "Escape") loadTasks();
      });
    }

    addForm.addEventListener("submit", async e => {
      e.preventDefault();
      const title = newTitle.value.trim();
      if (!title) return;
      try {
        await createTask(title);
        newTitle.value = "";
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    });

    loadTasks();
  </script>
</body>
</html>
